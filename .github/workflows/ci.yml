name: CI
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - run: dart analyze --no-fatal-warnings

  # Automated publishing (OIDC) — no credential needed.
  # Enable at https://pub.dev/packages/currencycore/admin -> "Automated
  # publishing" for repo "CurrencyCore/currencycore-dart", tag pattern "v{{version}}".
  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
